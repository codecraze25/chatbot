services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/chatbot.db
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://127.0.0.1"]'
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-You are a helpful assistant.}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-8000}
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-50}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
    volumes:
      - api-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  api-data:
  ollama-data:
